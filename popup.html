<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FB Group Post Wiper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }
    .dot.active {
      background: #e74c3c;
      box-shadow: 0 0 6px #e74c3c88;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .counter-block {
      text-align: center;
      margin: 8px 0 20px;
    }

    .counter {
      font-size: 56px;
      font-weight: 800;
      color: #e74c3c;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .counter.done { color: #2ecc71; }

    .counter-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .status {
      font-size: 12px;
      color: #777;
      text-align: center;
      min-height: 18px;
      margin-bottom: 16px;
      transition: color 0.2s;
    }

    .status.running { color: #e74c3c; }
    .status.done    { color: #2ecc71; }
    .status.warn    { color: #f39c12; }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    #startBtn {
      background: #e74c3c;
      color: #fff;
    }

    #stopBtn {
      background: #222;
      color: #888;
      margin-top: 8px;
      border: 1px solid #333;
    }

    #resetBtn {
      background: transparent;
      color: #444;
      font-size: 11px;
      margin-top: 4px;
      padding: 6px;
      border: none;
      text-decoration: underline;
      cursor: pointer;
    }
    #resetBtn:hover { color: #777; }

    .hidden { display: none !important; }

    .divider {
      height: 1px;
      background: #1e1e1e;
      margin: 16px 0;
    }

    .note {
      font-size: 10px;
      color: #444;
      text-align: center;
      line-height: 1.6;
    }

    .note a {
      color: #555;
      text-decoration: none;
    }

    .errline {
      font-size: 11px;
      color: #f39c12;
      text-align: center;
      min-height: 14px;
      margin: -8px 0 14px;
      word-break: break-word;
    }

    .logtoggle {
      font-size: 11px;
      color: #555;
      cursor: pointer;
      user-select: none;
      margin-bottom: 8px;
    }
    .logtoggle:hover { color: #888; }

    .log {
      background: #060606;
      border: 1px solid #1c1c1c;
      border-radius: 6px;
      padding: 8px;
      font-size: 10px;
      line-height: 1.5;
      color: #888;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Group Post Wiper</h1>
  </div>

  <div class="counter-block">
    <div class="counter" id="counter">0</div>
    <div class="counter-label">Posts Deleted</div>
  </div>

  <div class="status" id="status">Navigate to a Facebook group to start</div>
  <div class="errline" id="errline"></div>

  <button class="btn" id="startBtn">🗑️ &nbsp;Start Wiping</button>
  <button class="btn hidden" id="stopBtn">⏸ &nbsp;Pause</button>
  <button id="resetBtn" class="hidden">Reset counter</button>

  <div class="divider"></div>

  <div class="logtoggle" id="logToggle">▸ Activity log</div>
  <pre class="log hidden" id="log"></pre>

  <div class="note" id="note">
    You must be on a <strong>facebook.com/groups/...</strong> page<br>
    and be an <strong>admin</strong> of that group.
  </div>

  <script src="popup.js"></script>
</body>
</html>
