<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1b22"/>
      <stop offset="1" stop-color="#050507"/>
    </linearGradient>
    <radialGradient id="glow" cx="64" cy="50" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39ff8b" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#39ff8b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fang" x1="64" y1="20" x2="64" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eafff2"/>
      <stop offset="0.55" stop-color="#7CFFB0"/>
      <stop offset="1" stop-color="#21E07A"/>
    </linearGradient>
    <linearGradient id="drip" x1="64" y1="86" x2="64" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43F58E"/>
      <stop offset="1" stop-color="#16C268"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#glow)"/>
  <rect x="4.75" y="4.75" width="118.5" height="118.5" rx="27.25" stroke="#39ff8b" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- symbiote V / fangs -->
  <g filter="url(#soft)">
    <path d="M30 30
             C 41 27, 52 31, 64 58
             C 76 31, 87 27, 98 30
             C 92 47, 82 64, 70 80
             C 66 85, 62 85, 58 80
             C 46 64, 36 47, 30 30 Z"
          fill="url(#fang)"/>
    <!-- inner notch to read as two fangs -->
    <path d="M64 58 C 60 49, 56 43, 50 39 C 57 49, 61 57, 64 64 C 67 57, 71 49, 78 39 C 72 43, 68 49, 64 58 Z"
          fill="#0a0a0c" fill-opacity="0.55"/>
  </g>

  <!-- drip -->
  <path d="M64 84
           C 67 90, 70 95, 70 101
           C 70 108, 58 108, 58 101
           C 58 95, 61 90, 64 84 Z"
        fill="url(#drip)"/>
  <circle cx="64" cy="100.5" r="2.4" fill="#d8fff0" fill-opacity="0.85"/>
</svg>
